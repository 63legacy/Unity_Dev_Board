<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity Dev Board // Classic Layout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap');
        
        body { background-color: #e6eef4; color: #1a202c; font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .neu-panel {
            background: #e6eef4;
            border-radius: 20px;
            box-shadow: 10px 10px 20px #cfd7dd, -10px -10px 20px #ffffff;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .neu-btn {
            background: #e6eef4;
            border-radius: 12px;
            box-shadow: 5px 5px 10px #cfd7dd, -5px -5px 10px #ffffff;
            font-weight: 800;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .neu-btn:active { box-shadow: inset 4px 4px 8px #cfd7dd, inset -4px -4px 8px #ffffff; }

        input, textarea, select { 
            background: #ffffff !important; 
            border: 2px solid #cbd5e0 !important; 
            color: #000000 !important;
            font-size: 16px !important;
            padding: 12px !important;
            border-radius: 12px;
        }
        
        .task-card-text { font-size: 1.1rem; line-height: 1.4; word-break: break-word; }

        .tag { font-size: 11px; font-weight: 900; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; }
        .tag-code { background: #bee3f8; color: #2c5282; }
        .tag-art { background: #e9d8fd; color: #553c9a; }
        .tag-bug { background: #fed7d7; color: #9b2c2c; }
    </style>
</head>
<body class="p-6 md:p-12">

    <header class="max-w-7xl mx-auto mb-12 p-8 neu-panel flex flex-col md:flex-row justify-between items-center gap-8">
        <div class="w-full md:w-auto text-left">
            <input id="proj-name" oninput="save()" class="text-4xl font-black bg-transparent border-none outline-none w-full md:w-[400px]" value="PROJECT_SALOON">
            <p class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mt-2">Environment Control v4.3</p>
        </div>
        
        <div class="flex flex-wrap justify-end gap-4 w-full md:w-auto">
            <button onclick="downloadConfig()" class="neu-btn px-6 py-3 text-xs uppercase">
                <span>💾</span> Export JSON
            </button>
            <label class="neu-btn px-6 py-3 text-xs uppercase cursor-pointer">
                <span>📂</span> Import File <input type="file" class="hidden" onchange="uploadConfig(event)">
            </label>
            <button onclick="toggleEdit()" id="edit-btn" class="neu-btn px-6 py-3 text-xs uppercase text-blue-600 border-2 border-blue-500/20">
                <span>⚙️</span> Edit: Off
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto space-y-16">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <div class="space-y-6">
                <h3 class="text-sm font-black text-slate-400 px-4 tracking-widest uppercase italic">// Backlog</h3>
                <div id="col-todo" class="space-y-6"></div>
            </div>
            <div class="space-y-6">
                <h3 class="text-sm font-black text-blue-500 px-4 tracking-widest uppercase italic">// In Progress</h3>
                <div id="col-progress" class="space-y-6"></div>
            </div>
            <div class="space-y-6">
                <h3 class="text-sm font-black text-green-600 px-4 tracking-widest uppercase italic">// Done</h3>
                <div id="col-done" class="space-y-6"></div>
            </div>
        </div>

        <div class="neu-panel p-8 flex flex-col md:flex-row gap-6">
            <input type="text" id="task-text" placeholder="Опишите новую задачу..." class="flex-1 text-lg font-bold">
            <div class="flex gap-4">
                <select id="task-tag" class="w-40 font-bold uppercase">
                    <option value="code">Code</option>
                    <option value="art">Art</option>
                    <option value="bug">Bug</option>
                </select>
                <button onclick="addTask()" class="neu-btn bg-blue-600 text-white px-10 py-4 text-sm uppercase border-none shadow-lg shadow-blue-200">Add Task</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
            <div class="neu-panel p-8">
                <h4 class="text-sm font-black mb-8 text-slate-500 uppercase tracking-widest">Physics Layers</h4>
                <div id="layers-list" class="space-y-4"></div>
                <div id="layers-ctrl" class="mt-8"></div>
            </div>
            <div class="neu-panel p-8">
                <h4 class="text-sm font-black mb-8 text-slate-500 uppercase tracking-widest">Engine Constants</h4>
                <div id="balance-list" class="space-y-4"></div>
                <div id="balance-ctrl" class="mt-8"></div>
            </div>
        </div>

        <section class="neu-panel p-8">
            <h4 class="text-sm font-black mb-8 text-slate-500 uppercase tracking-widest">Code Snippets</h4>
            <div id="snippets-list" class="grid grid-cols-1 md:grid-cols-2 gap-10"></div>
            <div id="snippets-ctrl" class="mt-8"></div>
        </section>
    </main>

    <script>
        let isEdit = false;
        let db = JSON.parse(localStorage.getItem('unity_classic_db')) || {
            name: "SALOON_VR",
            tasks: [{text: "Настроить физику револьвера", tag: "code", status: "todo"}],
            layers: [{id: "6", name: "Player_Body"}],
            balance: [{key: "Gravity", val: "-9.81"}],
            snippets: [{title: "Start", code: "void Start() {}"}]
        };

        function toggleEdit() {
            isEdit = !isEdit;
            document.getElementById('edit-btn').innerHTML = `<span>⚙️</span> Edit: ${isEdit ? 'On' : 'Off'}`;
            render();
        }

        function render() {
            const cols = { todo: document.getElementById('col-todo'), progress: document.getElementById('col-progress'), done: document.getElementById('col-done') };
            Object.values(cols).forEach(c => c.innerHTML = '');
            
            db.tasks.forEach((t, i) => {
                const card = document.createElement('div');
                card.className = 'neu-panel p-6 space-y-4';
                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="tag tag-${t.tag}">${t.tag}</span>
                        ${isEdit ? `<button onclick="remove('tasks', ${i})" class="text-red-500 text-xl font-black">✕</button>` : ''}
                    </div>
                    ${isEdit ? `<textarea class="w-full font-bold" oninput="db.tasks[${i}].text=this.value;save()">${t.text}</textarea>` 
                             : `<p class="task-card-text font-bold text-slate-800">${t.text}</p>`}
                    <div class="flex gap-3 pt-2">
                        ${t.status !== 'todo' ? `<button onclick="move(${i}, 'todo')" class="neu-btn flex-1 py-2 text-[10px]">BACK</button>` : ''}
                        ${t.status !== 'progress' ? `<button onclick="move(${i}, 'progress')" class="neu-btn flex-1 py-2 text-[10px]">START</button>` : ''}
                        ${t.status !== 'done' ? `<button onclick="move(${i}, 'done')" class="neu-btn flex-1 py-2 text-[10px]">DONE</button>` : ''}
                    </div>
                `;
                cols[t.status].appendChild(card);
            });

            document.getElementById('layers-list').innerHTML = db.layers.map((l, i) => `
                <div class="flex gap-4 items-center border-b-2 border-slate-200 pb-3">
                    <input class="w-16 text-center text-blue-700 font-black" value="${l.id}" oninput="db.layers[${i}].id=this.value;save()" ${!isEdit?'disabled':''}>
                    <input class="flex-1 font-bold text-lg" value="${l.name}" oninput="db.layers[${i}].name=this.value;save()" ${!isEdit?'disabled':''}>
                    ${isEdit ? `<button onclick="remove('layers', ${i})" class="text-red-500 font-black px-2 text-xl">✕</button>` : ''}
                </div>
            `).join('');

            document.getElementById('balance-list').innerHTML = db.balance.map((b, i) => `
                <div class="flex gap-4 items-center border-b-2 border-slate-200 pb-3">
                    <input class="w-[65%] font-bold text-slate-600" value="${b.key}" oninput="db.balance[${i}].key=this.value;save()" ${!isEdit?'disabled':''}>
                    <input class="w-[35%] text-right font-black text-blue-900 text-lg" value="${b.val}" oninput="db.balance[${i}].val=this.value;save()" ${!isEdit?'disabled':''}>
                    ${isEdit ? `<button onclick="remove('balance', ${i})" class="text-red-500 font-black ml-2 text-xl">✕</button>` : ''}
                </div>
            `).join('');

            document.getElementById('snippets-list').innerHTML = db.snippets.map((s, i) => `
                <div class="neu-panel p-6 bg-white/40">
                    <input class="w-full font-black text-blue-800 text-sm uppercase mb-3 bg-transparent border-none p-0" value="${s.title}" oninput="db.snippets[${i}].title=this.value;save()" ${!isEdit?'disabled':''}>
                    <textarea class="w-full h-48 mono text-[13px] p-4 bg-slate-900 text-green-400 rounded-xl shadow-inner" oninput="db.snippets[${i}].code=this.value;save()" ${!isEdit?'disabled':''}>${s.code}</textarea>
                    ${isEdit ? `<button onclick="remove('snippets', ${i})" class="text-xs text-red-500 font-black mt-4 uppercase tracking-widest">Delete Block</button>` : ''}
                </div>
            `).join('');

            renderControls();
            save();
        }

        function renderControls() {
            const list = { layers: 'layers-ctrl', balance: 'balance-ctrl', snippets: 'snippets-ctrl' };
            Object.keys(list).forEach(k => {
                document.getElementById(list[k]).innerHTML = isEdit ? `<button onclick="addRow('${k}')" class="neu-btn px-6 py-2 text-xs font-black uppercase text-blue-500">+ Add ${k}</button>` : '';
            });
        }

        function addTask() {
            const text = document.getElementById('task-text').value;
            const tag = document.getElementById('task-tag').value;
            if(text) { db.tasks.push({text, tag, status: 'todo'}); document.getElementById('task-text').value = ''; render(); }
        }
        function move(i, status) { db.tasks[i].status = status; render(); }
        function remove(cat, i) { db[cat].splice(i, 1); render(); }
        function addRow(cat) {
            const t = { layers: {id:"0", name:"NewLayer"}, balance: {key:"Variable", val:"0"}, snippets: {title:"NewSnippet", code:"// logic"} };
            db[cat].push(t[cat]); render();
        }
        function save() { localStorage.setItem('unity_classic_db', JSON.stringify(db)); }
        function downloadConfig() {
            const blob = new Blob([JSON.stringify(db, null, 2)], {type : 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `config_export.json`; a.click();
        }
        function uploadConfig(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { db = JSON.parse(ev.target.result); render(); };
            reader.readAsText(e.target.files[0]);
        }

        render();
    </script>
</body>
</html>
